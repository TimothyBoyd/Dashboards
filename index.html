<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project</title>

  <style>
    body {
      scroll-behavior: smooth;
      margin: 0;
      background-color: #0e0728;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .slide-scroll {
      width: 100%;
      display: block;
      margin: 0 auto 2rem auto;
      border-radius: 12px;
    }

    .dashboard-frame {
      width: 100%;
      height: 750px;
      border: none;
      border-radius: 12px;
      margin: 2rem 0;
    }

    @media (max-width: 768px) {
      .dashboard-frame {
        height: 550px;
      }
    }
  </style>
</head>

<body>
  <main>

    <!-- Slides 1–5 -->
    <img src="slide1.png" alt="Slide 1" class="slide-scroll">
    <img src="slide2.png" alt="Slide 2" class="slide-scroll">
    <img src="slide3.png" alt="Slide 3" class="slide-scroll">
    <img src="slide4.png" alt="Slide 4" class="slide-scroll">
    <img src="slide5.png" alt="Slide 5" class="slide-scroll">

    <!-- Dashboard -->
    <iframe
      class="dashboard-frame"
      src="https://experience.arcgis.com/experience/bb7d640682a44ad8aa7b4820976371ef/"
      title="Dashboard"
      loading="lazy"
      allowfullscreen>
    </iframe>

    <!-- Final Slide -->
    <img src="slide6.png" alt="Slide 6" class="slide-scroll">

  </main>
</body>
</html>
