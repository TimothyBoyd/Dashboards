<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project</title>

  <style>
    body {
      scroll-behavior: smooth;
      margin: 0;
      background-color: #0e0728;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
      padding: 2.5rem 1rem 1.5rem 1rem;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 1.1;
      margin: 0 0 1rem 0;
      font-weight: 800;
    }

    .hero h2 {
      font-size: clamp(1.1rem, 2.3vw, 1.8rem);
      line-height: 1.4;
      margin: 0 0 1rem 0;
      font-weight: 500;
      color: #d7d0f5;
    }

    .hero a {
      display: inline-block;
      font-size: 1rem;
      color: #9ad1ff;
      text-decoration: none;
      font-weight: 600;
      word-break: break-word;
    }

    .hero a:hover {
      text-decoration: underline;
    }

    .slide-scroll {
      width: 100%;
      display: block;
      margin: 0 auto 2rem auto;
      border-radius: 12px;
    }

    .dashboard-frame {
      width: 100%;
      height: 750px;
      border: none;
      border-radius: 12px;
      margin: 2rem 0;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin: 2rem 0;
      align-items: start;
    }

    .chart-grid img {
      width: 100%;
      display: block;
      border-radius: 12px;
    }

    @media (max-width: 768px) {
      .dashboard-frame {
        height: 550px;
      }

      .chart-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main>

    <!-- Title Section -->
    <section class="hero">
      <h1>Mapping Homelessness and Supporting Resources in San Diego</h1>
      <h2>Interactive Point-In-Time Count (PITC) Density &amp; Resource Dashboards</h2>
      <a href="https://sdheart.sdsu.edu/" target="_blank" rel="noopener noreferrer">
        https://sdheart.sdsu.edu/
      </a>
    </section>

    <!-- Slides 1–2 -->
    <img src="slide1.png" alt="Slide 1" class="slide-scroll">
    <img src="slide2.png" alt="Slide 2" class="slide-scroll">

    <!-- Dashboard 1 (moved here) -->
    <iframe
      class="dashboard-frame"
      src="https://experience.arcgis.com/experience/bb7d640682a44ad8aa7b4820976371ef/"
      title="Dashboard 1"
      loading="lazy"
      allowfullscreen>
    </iframe>

    <!-- Slides 3–4 -->
    <img src="slide3.png" alt="Slide 3" class="slide-scroll">
    <img src="slide4.png" alt="Slide 4" class="slide-scroll">

    <!-- Charts inserted after Slide 4 -->
    <section class="chart-grid">
      <img src="ch1.png" alt="Chart 1">
      <img src="ch4.png" alt="Chart 4">
      <img src="ch2.png" alt="Chart 2">
      <img src="ch3.png" alt="Chart 3">
    </section>

    <!-- Slides 5–6 -->
    <img src="slide5.png" alt="Slide 5" class="slide-scroll">
    <img src="slide6.png" alt="Slide 6" class="slide-scroll">

    <!-- Dashboard 2 (between 6 and 7) -->
    <iframe
      class="dashboard-frame"
      src="https://experience.arcgis.com/experience/6724171f65b94c369ee94e91ca425cb8/"
      title="Dashboard 2"
      loading="lazy"
      allowfullscreen>
    </iframe>

    <!-- Slide 7 -->
    <img src="slide7.png" alt="Slide 7" class="slide-scroll">

    <!-- Dashboard 3 (between 7 and 8) -->
    <iframe
      class="dashboard-frame"
      src="https://experience.arcgis.com/experience/df00cf0d68464f968184e6ae2a174918/"
      title="Dashboard 3"
      loading="lazy"
      allowfullscreen>
    </iframe>

    <!-- Slide 8 -->
    <img src="slide8.png" alt="Slide 8" class="slide-scroll">

  </main>
</body>
</html>
